<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers - ASTRA Admin</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/admin/admin-layout.css">
    <style>
        .customers-table-wrap {
            background: #fff;
            border-radius: 12px;
            margin: 2rem;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 15px 20px;
            background: #fafafa;
            border-bottom: 2px solid #f0f0f0;
            color: #666;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        td {
            padding: 15px 20px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.95rem;
        }

        .cust-avatar {
            width: 40px;
            height: 40px;
            background: #eee;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #4f46e5;
        }

        .cust-name {
            font-weight: 600;
            color: #111;
        }

        .cust-date {
            color: #888;
            font-size: 0.8rem;
        }
    </style>
</head>

<body class="admin-customers">
    <div class="admin-wrapper">
        <aside class="admin-sidebar" id="admin-sidebar"></aside>

        <main class="admin-main">
            <header class="admin-header" id="admin-header"></header>

            <div class="admin-page-header" style="padding: 2rem 2rem 0">
                <h1>Customers</h1>
                <p>Manage your growing community</p>
            </div>

            <div class="customers-table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Customer</th>
                            <th>Email</th>
                            <th>Join Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="admin-customers-list"><!-- Dynamic --></tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/site.js"></script>
    <script src="../js/admin/admin-layout.js"></script>
    <script>
        const renderCustomers = () => {
            const list = document.getElementById('admin-customers-list');
            list.innerHTML = Auth.customers.map(cust => `
                <tr>
                    <td>
                        <div class="d-flex align-items-center gap-3">
                            <div class="cust-avatar">${cust.name[0]}</div>
                            <div class="cust-info">
                                <span class="cust-name">${cust.name}</span>
                            </div>
                        </div>
                    </td>
                    <td>${cust.email}</td>
                    <td class="cust-date">${new Date(cust.created_at || Date.now()).toLocaleDateString()}</td>
                    <td><button class="action-btn" title="View Profile"><i class="bi bi-eye"></i></button></td>
                </tr>`).join('');
        };

        Auth.syncAdminData().then(() => renderCustomers());
    </script>
</body>

</html>
